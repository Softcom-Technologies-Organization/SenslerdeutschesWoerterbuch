name: senslerdeutsches-woerterbuch

services:
  workspace:
    image: mcr.microsoft.com/devcontainers/python:3.12
    env_file: # Is this really needed here?
      - .env
    volumes: # Again, reall needed?
      - .:/workspace:cached
      
    # Map BOTH ports so you can see both apps
    ports:
      - "8000:8000" # Django
      - "4200:4200" # Angular
      
    # Keeps the container alive so you can open terminals inside it
    command: sleep infinity
    networks:
      - sw-network

  elasticsearch:
    build:
      context: .
      dockerfile: docker/elasticsearch/Dockerfile
    environment:
      - ELASTIC_PASSWORD=${ELASTIC_ADMIN_PASSWORD}
      - xpack.security.enabled=true
      - xpack.security.http.ssl.enabled=false
      - xpack.security.transport.ssl.enabled=false
      - discovery.type=single-node # Required to disable SSL while keeping security enabled
    volumes:
      - elasticsearch-data:/usr/share/elasticsearch/data # Persist user, role and indices locally
    networks:
      - sw-network

  backend:
    build:
      context: .
      dockerfile: docker/backend/Dockerfile
    env_file:
      - .env
    environment:
      - ELASTIC_URL=http://elasticsearch:9200
    ports:
      - "8001:8000"
    networks:
      - sw-network

  admin-app:
    build:
      context: .
      dockerfile: docker/admin-app/Dockerfile
    environment:
      - POSTGRES_HOST=db
    ports:
      - "8002:8000"

  proxy:
    build:
      context: .
      dockerfile: docker/proxy/Dockerfile
    environment:
      - ELASTICSEARCH_URL=http://elasticsearch:9200
    ports:
      - "${PROXY_PORT}:80"
    volumes:
      - ./docker/proxy/logs/nginx:/var/log/nginx
    networks:
      - sw-network

  e2e:
    build:
      context: .
      dockerfile: docker/e2e/Dockerfile
    environment:
      - FRONTEND_URL=${PROXY_URL}
    volumes:
      - ./e2e/playwright-report:/app/playwright-report
      - ./e2e/test-results:/app/test-results
    networks:
      - sw-network

  db:
    image: postgres
    environment:
      POSTGRES_DB: ${POSTGRES_NAME}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    networks:
      - sw-network

  adminer:
    image: adminer
    ports:
      - 8080:8080
    networks:
      - sw-network

networks:
  sw-network:
    driver: bridge

volumes:
  elasticsearch-data:
