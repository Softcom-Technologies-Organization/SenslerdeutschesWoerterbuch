name: E2e tests with Docker Compose

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  merge_group:

jobs:
  e2e-tests:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    timeout-minutes: 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Create .env file
        run: |
          cp .env.defaults .env

      - name: Run setup and prepare environment
        run: |
          docker compose up -d --build opensearch traefik backend frontend

      - name: Wait for OpenSearch via backend and sync index
        run: |
          echo "Waiting for OpenSearch to be reachable from backend..."
          for i in {1..24}; do
            if docker compose exec -T backend python manage.py shell -c "from dictionary.opensearch_helper import get_client; import sys; sys.exit(0 if get_client().ping() else 1)"; then
              echo "✅ OpenSearch reachable from backend"
              break
            fi

            if [ $i -eq 24 ]; then
              echo "❌ OpenSearch is not reachable from backend"
              docker compose logs opensearch
              docker compose logs backend
              exit 1
            fi

            echo "Waiting for OpenSearch... (attempt $i/24)"
            sleep 5
          done

          echo "Running import_words..."
          docker compose exec -T backend python manage.py import_words

          echo "Running sync_search..."
          docker compose exec -T backend python manage.py sync_search

      - name: Run E2E tests
        run: docker compose run --rm --build e2e
        env:
          COMPOSE_DOCKER_CLI_BUILD: 1
          DOCKER_BUILDKIT: 1

      - name: Save Playwright report
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: playwright-report
          path: ./e2e/playwright-report/
          retention-days: 30

      - name: Save test screenshots
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: test-screenshots
          path: ./e2e/test-results/
          retention-days: 7