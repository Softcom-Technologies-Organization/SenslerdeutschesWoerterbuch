name: Lint & Format

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  merge_group:

jobs:
  format-check:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    timeout-minutes: 5
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: Install root tooling
        run: npm ci

      - name: Check formatting with Prettier
        run: npm run format:check

  lint-frontend:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    timeout-minutes: 5
    defaults:
      run:
        working-directory: ./frontend
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: ./frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

  lint-e2e:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    timeout-minutes: 5
    defaults:
      run:
        working-directory: ./e2e
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: ./e2e/package-lock.json

      - name: Install e2e dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint
